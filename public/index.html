<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Upload Test</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { margin-bottom: 1rem; }
        button { cursor: pointer; background: #4d0000; color: rgb(255, 255, 255); border: none; padding: 10px 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Upload Image</h2>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <button type="submit">Upload</button>
        </form>
    </div>

    <hr>

    <h2>Gallery</h2>
    <div id="gallery" style="display: flex; gap: 10px; flex-wrap: wrap;">
        </div>

    <script>
        async function loadImages() {
            const response = await fetch('/api/images');
            const images = await response.json();
            const gallery = document.getElementById('gallery');
                       
            gallery.innerHTML = images.map(img => `
                <div id="img-card-${img.id}" style="border: 1px solid #ccc; padding: 10px; text-align: center;">
                    <img src="${img.imageData}" style="width: 150px; height: 150px; object-fit: cover; display: block; margin-bottom: 5px;">
                    <span style="font-size: 10px;">ID: ${img.id}</span><br>
                    <button onclick="deleteImage(${img.id})" style="background: #ff4d4d; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px;">
                        Delete
                    </button>
                </div>
            `).join('');
        }

        async function deleteImage(id) {
            //if (!confirm("Are you sure you want to delete this image?")) return;

            try {
                const response = await fetch(`/api/images/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    document.getElementById(`img-card-${id}`).remove();
                } else {
                    alert("Failed to delete");
                }
            } catch (err) {
                console.error("Error:", err);
            }
        }

        loadImages();
    </script>
</body>
</html>
